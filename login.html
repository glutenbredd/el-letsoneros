<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400..800&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <title>Login | El Letsonero's</title>
    <link rel="icon" type="image/png" href="favicon.png" sizes="32x32" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --cream: #f5f0d8;
            --dark-green: #1a3a2a;
            --mid-green: #2d6a4f;
            --accent-green: #3a7d44;
            --red: #c0392b;
            --gold: #e8b84b;
            --text-dark: #1a1a1a;
        }

        body {
            font-family: 'Syne', sans-serif;
            background-color: var(--cream);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* header */
        .header {
            background: var(--dark-green);
            padding: 1rem 2.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 3px solid var(--gold);
        }

        .logo {
            color: #fff;
            font-size: 1.3rem;
            font-weight: 700;
            text-decoration: none;
            letter-spacing: 0.03em;
        }

        .logo span { color: var(--gold); }

        /* main layout */
        .login-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem 1.5rem;
        }

        .login-card {
            background: #fff;
            border: 2px solid var(--dark-green);
            border-radius: 16px;
            padding: 2.5rem 2.75rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 6px 6px 0px var(--dark-green);
            animation: fadeUp 0.4s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(18px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .card-brand {
            text-align: center;
            margin-bottom: 2rem;
        }

        .card-brand h1 {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--red);
            letter-spacing: 0.02em;
            line-height: 1.1;
        }

        .card-brand p {
            font-size: 0.85rem;
            color: var(--mid-green);
            margin-top: 0.3rem;
            font-weight: 500;
        }

        /* tabs */
        .tabs {
            display: flex;
            border: 1.5px solid var(--dark-green);
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 1.75rem;
        }

        .tab-btn {
            flex: 1;
            padding: 0.6rem;
            font-family: 'Syne', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            border: none;
            background: transparent;
            color: var(--dark-green);
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }

        .tab-btn.active {
            background: var(--dark-green);
            color: #fff;
        }

        /* form */
        .field { margin-bottom: 1.1rem; }

        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--dark-green);
            margin-bottom: 5px;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        input[type=email],
        input[type=password] {
            width: 100%;
            height: 42px;
            border: 1.5px solid #c5c5b0;
            border-radius: 8px;
            background: var(--cream);
            font-family: 'Syne', sans-serif;
            font-size: 0.95rem;
            color: var(--text-dark);
            padding: 0 12px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus {
            border-color: var(--accent-green);
            box-shadow: 0 0 0 3px rgba(58,125,68,0.15);
        }

        .forgot {
            display: block;
            text-align: right;
            font-size: 0.78rem;
            color: var(--mid-green);
            font-weight: 600;
            text-decoration: none;
            margin-top: 5px;
            cursor: pointer;
        }

        .forgot:hover { text-decoration: underline; }

        .btn-submit {
            width: 100%;
            height: 44px;
            background: var(--red);
            color: #fff;
            border: 2px solid var(--red);
            border-radius: 8px;
            font-family: 'Syne', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            cursor: pointer;
            margin-top: 1.4rem;
            transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
            box-shadow: 3px 3px 0 #8b1a13;
        }

        .btn-submit:hover {
            background: #a93226;
            box-shadow: 2px 2px 0 #8b1a13;
            transform: translate(1px, 1px);
        }

        .btn-submit:active { transform: translate(3px, 3px); box-shadow: none; }
        .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: 3px 3px 0 #8b1a13; }

        /* toast */
        .toast {
            font-size: 0.82rem;
            font-weight: 600;
            padding: 0.65rem 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: none;
        }

        .toast.error {
            background: #fdecea;
            border: 1.5px solid #e57373;
            color: #b71c1c;
            display: block;
        }

        .toast.success {
            background: #e8f5e9;
            border: 1.5px solid #81c784;
            color: #1b5e20;
            display: block;
        }

        /* footer */
        footer {
            text-align: center;
            padding: 1.2rem;
            font-size: 0.8rem;
            color: var(--dark-green);
            font-weight: 600;
            border-top: 2px solid var(--dark-green);
            background: var(--cream);
        }

        footer span { color: var(--red); }

        .switch-text {
            text-align: center;
            font-size: 0.82rem;
            color: #666;
            margin-top: 1.2rem;
        }

        .switch-text a {
            color: var(--accent-green);
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
        }

        .switch-text a:hover { text-decoration: underline; }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 0.8rem;
            color: #aaa;
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 1.5rem;
        }

        .back-link:hover { color: var(--dark-green); }
    </style>
</head>
<body>

<header class="header">
    <a href="index.html" class="logo">El Letsonero<span>'s</span></a>
</header>

<div class="login-wrapper">
    <div class="login-card">

        <a href="index.html" class="back-link">
            <i class="bx bx-arrow-back"></i> Back to site
        </a>

        <div class="card-brand">
            <h1>EL LETSONERO'S</h1>
            <p>Sign in to manage your orders</p>
        </div>

        <div class="tabs">
            <button class="tab-btn active" id="tab-in" onclick="setTab('in')">Sign In</button>
            <button class="tab-btn" id="tab-up" onclick="setTab('up')">Sign Up</button>
        </div>

        <div id="toast" class="toast"></div>

        <!-- Sign In -->
        <div id="form-in">
            <div class="field">
                <label>Email</label>
                <input type="email" id="si-email" placeholder="you@example.com" />
            </div>
            <div class="field">
                <label>Password</label>
                <input type="password" id="si-pass" placeholder="••••••••" />
                <a class="forgot" onclick="handleForgot()">Forgot password?</a>
            </div>
            <button class="btn-submit" id="si-btn" onclick="handleSignIn()">Sign In</button>
            <p class="switch-text">No account yet? <a onclick="setTab('up')">Sign up</a></p>
        </div>

        <!-- Sign Up -->
        <div id="form-up" style="display:none">
            <div class="field">
                <label>Email</label>
                <input type="email" id="su-email" placeholder="you@example.com" />
            </div>
            <div class="field">
                <label>Password</label>
                <input type="password" id="su-pass" placeholder="Min. 6 characters" />
            </div>
            <button class="btn-submit" id="su-btn" onclick="handleSignUp()">Create Account</button>
            <p class="switch-text">Already have an account? <a onclick="setTab('in')">Sign in</a></p>
        </div>

    </div>
</div>

<footer>
    &copy; 2025 <span>El Letsoneros</span> — Baclayon, Bohol
</footer>

<script>
    // Supabase init
    const { createClient } = supabase
    const db = createClient(
        'https://oqjbpfcekubulyeynywf.supabase.co',
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9xamJwZmNla3VidWx5ZXlueXdmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzNjE1MjYsImV4cCI6MjA5MDkzNzUyNn0.k9l3w3PfWEnQ4ph8BqUUVI1ODxNkG8D1aZU3ou-V91A'
    )

    // Tab switch
    function setTab(t) {
        const isIn = t === 'in'
        document.getElementById('form-in').style.display = isIn ? '' : 'none'
        document.getElementById('form-up').style.display = isIn ? 'none' : ''
        document.getElementById('tab-in').classList.toggle('active', isIn)
        document.getElementById('tab-up').classList.toggle('active', !isIn)
        hideToast()
    }

    // Toast
    function showToast(msg, type) {
        const t = document.getElementById('toast')
        t.textContent = msg
        t.className = 'toast ' + type
    }
    function hideToast() {
        const t = document.getElementById('toast')
        t.className = 'toast'
    }

    // Sign In
    async function handleSignIn() {
        const email = document.getElementById('si-email').value.trim()
        const pass  = document.getElementById('si-pass').value
        if (!email || !pass) return showToast('Please fill in all fields.', 'error')

        const btn = document.getElementById('si-btn')
        btn.disabled = true
        btn.textContent = 'Signing in...'

        const { error } = await db.auth.signInWithPassword({ email, password: pass })

        btn.disabled = false
        btn.textContent = 'Sign In'

        if (error) return showToast(error.message, 'error')
        showToast('Welcome back! Redirecting...', 'success')
        setTimeout(() => window.location.href = 'index.html', 1200)
    }

    // Sign Up
    async function handleSignUp() {
        const email = document.getElementById('su-email').value.trim()
        const pass  = document.getElementById('su-pass').value
        if (!email || !pass) return showToast('Please fill in all fields.', 'error')
        if (pass.length < 6) return showToast('Password must be at least 6 characters.', 'error')

        const btn = document.getElementById('su-btn')
        btn.disabled = true
        btn.textContent = 'Creating account...'

        const { error } = await db.auth.signUp({ email, password: pass })

        btn.disabled = false
        btn.textContent = 'Create Account'

        if (error) return showToast(error.message, 'error')
        showToast('Account created! Check your email to confirm.', 'success')
    }

    // Forgot Password
    async function handleForgot() {
        const email = document.getElementById('si-email').value.trim()
        if (!email) return showToast('Enter your email first, then click forgot password.', 'error')

        const { error } = await db.auth.resetPasswordForEmail(email)
        if (error) return showToast(error.message, 'error')
        showToast('Password reset email sent!', 'success')
    }

    // Redirect if already logged in
    db.auth.getSession().then(({ data: { session } }) => {
        if (session) window.location.href = 'index.html'
    })
</script>

</body>
</html>
